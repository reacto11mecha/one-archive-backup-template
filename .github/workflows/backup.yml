# Secrets Env
# CHISEL_AUTH
# CHISEL_SERVER
# DB_NAME
# DB_PORT
# DB_USER_PASS
# S3_ACCESS_KEY
# S3_SECRET_KEY

name: Backup Database & S3 CI

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 7,17 * * *'

jobs:
  backup:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Setup Chisel Tunnel
        env:
          CHISEL_VERSION: "1.11.5"
          CHISEL_AUTH: ${{ secrets.CHISEL_AUTH }}
          CHISEL_SERVER: ${{ secrets.CHISEL_SERVER }}
          DB_PORT: ${{ secrets.DB_PORT }}
          S3_PORT: "8333"
        run: |
          echo "Downloading Chisel v${CHISEL_VERSION}..."
          curl -sL https://github.com/jpillora/chisel/releases/download/v${CHISEL_VERSION}/chisel_${CHISEL_VERSION}_linux_amd64.gz | zcat > chisel
          chmod +x chisel

          echo "Establishing tunnel for DB and S3..."
          # Menambahkan tunneling untuk port DB (5431) DAN S3 (8333) sekaligus
          ./chisel client --auth "$CHISEL_AUTH" "$CHISEL_SERVER" "$DB_PORT:localhost:$DB_PORT" "$S3_PORT:localhost:$S3_PORT" &
          
          # Wait for tunnel initialization
          sleep 5

      - name: Postgres Dump Backup
        uses: tj-actions/pg-dump@v3
        with:
          database_url: "postgres://${{ secrets.DB_USER_PASS }}@localhost:${{ secrets.DB_PORT }}/${{ secrets.DB_NAME }}"
          postgresql_version: "16"
          path: "backups/db_now.sql" 
          options: "-O"

      - name: S3 Bucket Backup (SeaweedFS)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_KEY }}
          AWS_DEFAULT_REGION: "us-east-1"
        run: |
          echo "Syncing S3 Bucket 'onearchive'..."
          # Mengunduh seluruh isi bucket ke folder sementara menggunakan AWS CLI bawaan runner
          aws s3 sync s3://onearchive ./backups/s3_tmp --endpoint-url http://localhost:8333
          
          echo "Compressing S3 Backup..."
          # Mengkompres file arsip agar hemat tempat di Git
          tar -czvf "./backups/s3_$(TZ="Asia/Jakarta" date +"%d-%B-%Y_%H-%M-%S").tar.gz" -C ./backups s3_tmp
          
          # Hapus folder sementara agar tidak ikut ter-commit
          rm -rf ./backups/s3_tmp

      - name: Rename SQL file
        run: |
          mv "./backups/db_now.sql" "./backups/db_$(TZ="Asia/Jakarta" date +"%d-%B-%Y_%H-%M-%S").sql"

      - name: Push new backup to backups folder
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          TIMESTAMP=$(TZ="Asia/Jakarta" date +"%Y-%m-%dT%H:%M:%S%z")

          git add backups
          git commit -m "[DB & S3 BACKUP] $TIMESTAMP"
          git push
